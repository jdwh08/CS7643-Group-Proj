task: segmentation
tiled_inference_on_testing: false
tiled_inference_on_validation: false
path_to_record_metrics: null
model_args:
  backbone: prithvi_eo_v2_300_tl
  backbone_pretrained: false
  backbone_bands:
  - BLUE
  - GREEN
  - RED
  - RED_EDGE_1
  - RED_EDGE_2
  - RED_EDGE_3
  - NIR_BROAD
  - NIR_NARROW
  - SWIR_1
  - SWIR_2
  decoder: UperNetDecoder
  decoder_channels: 256
  decoder_scale_modules: false
  num_classes: 2
  rescale: true
  head_dropout: 0.1
  necks:
  - name: SelectIndices
    indices:
    - 5
    - 11
    - 17
    - 23
  - name: ReshapeTokensToImage
model_factory: EncoderDecoderFactory
model: null
loss: ce
aux_heads: null
aux_loss: null
class_weights: null
ignore_index: 255
lr: 5.0e-05
optimizer: AdamW
optimizer_hparams:
  weight_decay: 0.05
scheduler: CosineAnnealingLR
scheduler_hparams:
  T_max: 20
  eta_min: 0
freeze_backbone: false
freeze_decoder: false
freeze_head: false
plot_on_val: 10
class_names: null
tiled_inference_parameters: null
test_dataloaders_names: null
lr_overrides: null
output_on_inference: prediction
output_most_probable: true
